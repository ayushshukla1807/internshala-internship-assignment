<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Internshala paper plane favicon -->
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#00ADEF" opacity="0.15"/>
  <!-- Paper plane -->
  <g transform="translate(3, 3)">
    <!-- Main plane body - pointing upper right -->
